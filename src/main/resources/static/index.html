<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .nav-pills .nav-link.active { background-color: #764ba2; }
        .nav-pills .nav-link { color: #495057; font-weight: 500; }
        .expense-item { border-left: 4px solid #667eea; transition: transform 0.2s; cursor: pointer; }
        .expense-item:hover { transform: scale(1.02); background-color: #f8f9fa; }

        /* App Sections */
        #dashboardSection { display: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm py-3">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">
            <i class="fa-solid fa-wallet me-2"></i>ExpenseTraker
        </a>
        <div class="d-flex text-white align-items-center" id="userStatus" style="display: none !important;">
            <span class="me-3" id="welcomeMessage"></span>
            <button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container mt-5" id="authSection">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <ul class="nav nav-tabs mb-4" id="authTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Register</button>
                    </li>
                </ul>
                <div class="tab-content" id="authTabsContent">

                    <div class="tab-pane fade show active" id="login" role="tabpanel">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control" id="loginUsername" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="loginPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" style="background-color: #764ba2; border: none;">Login</button>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="register" role="tabpanel">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control" id="regUsername" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="regEmail" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="regPassword" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Register</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-5" id="dashboardSection">
    <div class="row">
        <div class="col-md-3 mb-4">
            <div class="card p-3">
                <ul class="nav nav-pills flex-column" id="dashboardTabs" role="tablist">
                    <li class="nav-item"><button class="nav-link active w-100 text-start mb-2" data-bs-toggle="pill" data-bs-target="#home" type="button"><i class="fa-solid fa-house me-2"></i> Dashboard</button></li>
                    <li class="nav-item"><button class="nav-link w-100 text-start mb-2" data-bs-toggle="pill" data-bs-target="#add" type="button"><i class="fa-solid fa-plus-circle me-2"></i> Add Expense</button></li>
                    <li class="nav-item"><button class="nav-link w-100 text-start mb-2" data-bs-toggle="pill" data-bs-target="#transactions" type="button" onclick="loadAllTransactions()"><i class="fa-solid fa-list me-2"></i> All Transactions</button></li>
                    <li class="nav-item"><button class="nav-link w-100 text-start" data-bs-toggle="pill" data-bs-target="#reports" type="button"><i class="fa-solid fa-chart-pie me-2"></i> Reports</button></li>
                </ul>
            </div>
        </div>

        <div class="col-md-9">
            <div class="tab-content">

                <div class="tab-pane fade show active" id="home">
                    <h3 class="mb-4">Recent Highlights</h3>
                    <div class="card p-4 mb-4">
                        <h5 class="text-muted mb-3">Top 3 Highest Expenses</h5>
                        <ul class="list-group list-group-flush" id="top3Container">
                            <p class="text-muted">Loading...</p>
                        </ul>
                    </div>
                </div>

                <div class="tab-pane fade" id="add">
                    <h3 class="mb-4">Log a New Expense</h3>
                    <div class="card p-4">
                        <form id="addExpenseForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Amount</label>
                                    <input type="number" step="0.01" class="form-control" id="expAmount" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Date</label>
                                    <input type="date" class="form-control" id="expDate" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Category</label>
                                <select class="form-select" id="expCategory" required>
                                    <option value="FOOD_AND_DRINK">Food</option>
                                    <option value="GROCERIES">GROCERIES</option>
                                    <option value="TRANSPORTATION">TRANSPORTATION</option>
                                    <option value="HOUSING">HOUSING</option>
                                    <option value="UTILITIES">UTILITIES</option>
                                    <option value="HEALTH_AND_MEDICAL">HEALTH_AND_MEDICAL</option>
                                    <option value="PERSONAL_CARE">PERSONAL_CARE</option>
                                    <option value="ENTERTAINMENT">ENTERTAINMENT</option>
                                    <option value="SHOPPING">SHOPPING</option>
                                    <option value="SUBSCRIPTIONS">SUBSCRIPTIONS</option>
                                    <option value="EDUCATION">EDUCATION</option>
                                    <option value="INVESTMENTS">INVESTMENTS</option>
                                    <option value="DEBT_REPAYMENT">DEBT_REPAYMENT</option>
                                    <option value="GIFTS_AND_DONATIONS">GIFTS_AND_DONATIONS</option>
                                    <option value="PETS">PETS</option>
                                    <option value="MISCELLANEOUS">MISCELLANEOUS</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" id="expDesc" rows="2" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" style="background-color: #667eea; border: none;">Save Expense</button>
                        </form>
                    </div>
                </div>

                <div class="tab-pane fade" id="transactions">
                    <h3 class="mb-4">Transaction History</h3>
                    <div class="card p-4" id="allTransactionsContainer">
                        <p class="text-muted">Loading...</p>
                    </div>
                </div>

                <div class="tab-pane fade" id="reports">
                    <h3 class="mb-4">Monthly Report</h3>
                    <div class="card p-4">
                        <div class="row align-items-end mb-4">
                            <div class="col-md-8">
                                <label class="form-label">Select Month (1-12)</label>
                                <input type="number" class="form-control" id="reportMonth" min="1" max="12" value="3">
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-dark w-100" onclick="getReport()">Get Report</button>
                            </div>
                        </div>
                        <div class="text-center p-5 bg-light rounded border" id="reportArea">
                            <h4 class="text-muted">Enter month to view report</h4>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<div class="offcanvas offcanvas-end" tabindex="-1" id="expenseDetailSlide">
    <div class="offcanvas-header bg-light">
        <h5 class="offcanvas-title">Transaction Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <div class="text-center mb-4 mt-3">
            <div class="display-4 text-danger fw-bold mb-2" id="slideAmount"></div>
            <span class="badge bg-secondary fs-6" id="slideCategory"></span>
        </div>
        <hr>
        <div class="mb-3"><strong>Date:</strong> <p class="text-muted" id="slideDate"></p></div>
        <div class="mb-3"><strong>Description:</strong> <p class="text-muted" id="slideDesc"></p></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE_URL = "/api";
    let currentUser = null;

    // --- 1. Authentication Logic ---
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            username: document.getElementById('regUsername').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value
        };

        try {
            const res = await fetch(`${API_BASE_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if(res.ok) {
                alert("Registration successful! Please login.");
                document.getElementById('login-tab').click(); // Switch to login tab
            } else {
                alert("Registration failed.");
            }
        } catch(err) { console.error(err); }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value;
        const data = {
            username: username,
            password: document.getElementById('loginPassword').value,
            email: "" // DTO expects it, but may not be needed for login
        };

        try {
            const res = await fetch(`${API_BASE_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            // Assuming your backend returns 200 OK on successful login
            if(res.ok) {
                currentUser = username;
                showDashboard();
            } else {
                alert("Invalid credentials.");
            }
        } catch(err) { console.error(err); }
    });

    function showDashboard() {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('dashboardSection').style.display = 'block';
        document.getElementById('userStatus').style.display = 'flex';
        document.getElementById('welcomeMessage').innerText = `Welcome, ${currentUser}`;

        // Set today's date in the add form automatically
        document.getElementById('expDate').valueAsDate = new Date();

        loadTop3Expenses();
    }

    function logout() {
        currentUser = null;
        document.getElementById('authSection').style.display = 'block';
        document.getElementById('dashboardSection').style.display = 'none';
        document.getElementById('userStatus').style.display = 'none';
        document.getElementById('loginForm').reset();
    }

    // --- 2. Add Expense Logic ---
    document.getElementById("addExpenseForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        // Matches ExpenseRequestDTO
        const expenseData = {
            amount: parseFloat(document.getElementById('expAmount').value),
            category: document.getElementById('expCategory').value,
            date: document.getElementById('expDate').value,
            description: document.getElementById('expDesc').value
        };

        try {
            // Dynamically uses the logged-in username in the URL
            const response = await fetch(`${API_BASE_URL}/${currentUser}/add`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(expenseData)
            });

            if (response.ok) {
                alert("Expense added successfully!");
                document.getElementById("addExpenseForm").reset();
                document.getElementById('expDate').valueAsDate = new Date(); // reset date
                loadTop3Expenses();
            } else {
                alert("Failed to add expense.");
            }
        } catch (error) { console.error(error); }
    });

    // --- 3. Fetch Data Logic ---
    async function loadTop3Expenses() {
        if(!currentUser) return;
        const res = await fetch(`${API_BASE_URL}/${currentUser}/get/top3`);
        if (res.ok) {
            const expenses = await res.json();
            const container = document.getElementById("top3Container");
            container.innerHTML = "";
            if(expenses.length === 0) container.innerHTML = "<p class='text-muted'>No expenses yet.</p>";

            expenses.forEach(exp => {
                container.innerHTML += `
                    <li class="list-group-item d-flex justify-content-between align-items-center expense-item p-3 mb-2 rounded border">
                        <div><h6 class="mb-0 fw-bold">${exp.description}</h6><small class="text-muted">${exp.category} | ${exp.date}</small></div>
                        <span class="badge bg-danger rounded-pill fs-6">₹${exp.amount}</span>
                    </li>`;
            });
        }
    }

    async function loadAllTransactions() {
        if(!currentUser) return;
        const res = await fetch(`${API_BASE_URL}/${currentUser}/get`);
        if (res.ok) {
            const expenses = await res.json();
            const container = document.getElementById("allTransactionsContainer");
            container.innerHTML = "";
            if(expenses.length === 0) container.innerHTML = "<p class='text-muted'>No transactions found.</p>";

            expenses.forEach(exp => {
                const expJson = JSON.stringify(exp).replace(/"/g, '&quot;');
                container.innerHTML += `
                    <div class="expense-item p-3 mb-3 border rounded d-flex justify-content-between"
                         data-bs-toggle="offcanvas" data-bs-target="#expenseDetailSlide"
                         onclick="populateSlide(${expJson})">
                        <div><h5 class="mb-1">${exp.description}</h5><small class="text-muted">${exp.date}</small></div>
                        <h5 class="text-danger">- ₹${exp.amount}</h5>
                    </div>`;
            });
        }
    }

    function populateSlide(expense) {
        document.getElementById("slideAmount").innerText = `-₹${expense.amount}`;
        document.getElementById("slideCategory").innerText = expense.category;
        document.getElementById("slideDate").innerText = expense.date;
        document.getElementById("slideDesc").innerText = expense.description;
    }

    async function getReport() {
        if(!currentUser) return;
        const month = document.getElementById("reportMonth").value;
        const res = await fetch(`${API_BASE_URL}/${currentUser}/report/${month}`);
        if (res.ok) {
            const report = await res.json();
            // Assumes your MonthlyReportDTO has fields like totalAmount, totalExpenses, etc.
            document.getElementById("reportArea").innerHTML = `
                <h4 class="text-success mb-3">Report for Month ${month}</h4>
                <p class="text-dark fs-5 mb-0">Total Spent: <strong>₹${report.TotalSpedndedAmmount || 0}</strong></p>
            `;
        }
    }
</script>
</body>
</html>
